<svg xmlns="http://www.w3.org/2000/svg" width="600" height="560" viewBox="0 0 600 560">
<rect x="0" y="0" width="600" height="560" fill="#FFFFFF"/>
<style><![CDATA[
.wall{stroke:#1A1A1A;stroke-width:6;fill:none;}
.thin{stroke:#1A1A1A;stroke-width:1.5;fill:none;}
.door{stroke:#1A1A1A;stroke-width:1.5;fill:none;}
.label{font-family:monospace;font-size:11px;fill:#1A1A1A;text-anchor:middle;}
.small{font-family:monospace;font-size:10px;fill:#1A1A1A;}
.tiny{font-family:monospace;font-size:8px;fill:#1A1A1A;text-anchor:middle;}
.flaw{fill:none;stroke:#D00000;stroke-width:1.5;stroke-dasharray:6,5;}
]]></style>

<rect x="60" y="80" width="480" height="380" fill="none" class="wall"/>
<line x1="300" y1="80" x2="300" y2="460" class="wall"/>
<line x1="60" y1="270" x2="540" y2="270" class="wall"/>

<text x="90" y="55" class="small">FRONT DOOR</text>
<line x1="90" y1="80" x2="140" y2="80" stroke="#FFFFFF" stroke-width="10"/>
<line x1="90" y1="80" x2="90" y2="105" class="thin"/>
<path d="M90 105 A30 30 0 0 1 120 80" class="door"/>

<line x1="300" y1="162" x2="300" y2="188" stroke="#FFFFFF" stroke-width="10"/>
<line x1="300" y1="162" x2="300" y2="188" class="thin"/>
<path d="M300 188 A26 26 0 0 0 274 162" class="door"/>
<line x1="407" y1="270" x2="433" y2="270" stroke="#FFFFFF" stroke-width="10"/>
<line x1="407" y1="270" x2="407" y2="296" class="thin"/>
<path d="M407 296 A26 26 0 0 1 433 270" class="door"/>
<line x1="300" y1="352" x2="300" y2="378" stroke="#FFFFFF" stroke-width="10"/>
<line x1="300" y1="352" x2="300" y2="378" class="thin"/>
<path d="M300 378 A26 26 0 0 0 274 352" class="door"/>

<text x="180" y="110" class="label">LIVING AREA</text>
<rect x="90" y="215" width="55" height="35" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="1.5"/><text x="117" y="236" class="tiny">SOFA</text>
<text x="420" y="110" class="label">KITCHEN</text>
<rect x="330" y="105" width="26" height="24" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="1.5"/><text x="343" y="122" class="tiny">FRG</text>
<rect x="360" y="105" width="26" height="24" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="1.5"/><text x="373" y="122" class="tiny">STV</text>
<rect x="390" y="105" width="26" height="22" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="1.5"/><text x="403" y="121" class="tiny">SINK</text>
<text x="180" y="300" class="label">BEDROOM</text>
<rect x="75" y="395" width="80" height="50" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="1.5"/>
<line x1="75" y1="405" x2="155" y2="405" class="thin"/>
<text x="115" y="437" class="tiny">BED</text>
<text x="420" y="300" class="label">BATH</text>
<rect x="490" y="285" width="36" height="22" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="1.5"/><text x="508" y="299" class="tiny">TUB</text>
<rect x="315" y="430" width="26" height="20" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="1.5"/><text x="328" y="443" class="tiny">SINK</text>

<rect x="60" y="80" width="240" height="190" class="flaw"/>
<path d="M180 270 L150 500" stroke="#D00000" stroke-width="1.5" fill="none"/>
<circle cx="180" cy="270" r="3" fill="#D00000"/>
<text x="40" y="530" class="small" fill="#D00000">FLAW: Narrow pinch points make moving furniture difficult and can be a daily problem for re</text>

<g transform="translate(500,50)">
<circle cx="0" cy="0" r="18" fill="none" stroke="#1A1A1A" stroke-width="1.2"/>
<path d="M0 -24 L4 -14 L0 -17 L-4 -14 Z" fill="#1A1A1A"/>
<text x="0" y="-28" class="tiny">N</text>
</g>

<text x="60" y="555" class="small">KANSAS CITY / 1 BEDROOM</text>
</svg>