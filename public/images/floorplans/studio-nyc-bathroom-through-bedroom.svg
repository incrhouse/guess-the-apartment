<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 556 563" width="100%" height="100%">
  <defs>
    <style>
      .wall { fill: #F5F5F5; stroke: #1A1A1A; stroke-width: 8; stroke-linejoin: round; }
      .fixture { fill: #FFFFFF; stroke: #1A1A1A; stroke-width: 3; }
      .text-main { font-family: "Courier New", Courier, monospace; font-weight: bold; font-size: 14px; fill: #1A1A1A; text-anchor: middle; }
      .text-sub { font-family: "Courier New", Courier, monospace; font-weight: bold; font-size: 11px; fill: #1A1A1A; text-anchor: middle; }
      .text-flaw { font-family: "Courier New", Courier, monospace; font-weight: bold; font-size: 11px; fill: #D00000; text-anchor: start; }
      .door-arc { stroke: #1A1A1A; stroke-width: 2; stroke-dasharray: 4,3; fill: none; }
      .door-line { stroke: #1A1A1A; stroke-width: 3; fill: none; }
      .flaw-highlight { fill: none; stroke: #D00000; stroke-width: 3; stroke-dasharray: 6,5; }
      .compass-text { font-family: "Courier New", Courier, monospace; font-weight: bold; font-size: 12px; fill: #1A1A1A; text-anchor: middle; }
    </style>
  </defs>

  <rect width="556" height="563" fill="#FFFFFF" />

  <rect x="40" y="140" width="289" height="210" class="wall" />
  <rect x="329" y="140" width="137" height="120" class="wall" />
  <rect x="40" y="350" width="217" height="171" class="wall" />
  <rect x="257" y="350" width="141" height="127" class="wall" />

  <rect x="334" y="227" width="30" height="30" class="fixture" /><text x="349" y="246" class="text-sub">FRG</text>
  <rect x="369" y="227" width="30" height="30" class="fixture" /><text x="384" y="246" class="text-sub">STV</text>
  <rect x="404" y="227" width="30" height="25" class="fixture" /><text x="419" y="243" class="text-sub">SINK</text>

  <rect x="343" y="440" width="50" height="25" class="fixture" /><text x="368" y="456" class="text-sub">TUB</text>
  <rect x="267" y="442" width="30" height="25" class="fixture" /><text x="282" y="458" class="text-sub">SINK</text>

  <rect x="55" y="462" width="90" height="70" class="fixture" />
  <line x1="55" y1="472" x2="145" y2="472" stroke="#1A1A1A" stroke-width="2" />
  <text x="100" y="524" class="text-sub">BED</text>

  <line x1="70" y1="140" x2="70" y2="180" class="door-line" />
  <path d="M 70 180 A 40 40 0 0 1 110 140" class="door-arc" />
  <line x1="68" y1="140" x2="112" y2="140" stroke="#FFFFFF" stroke-width="10" />

  <text x="184" y="260" class="text-main">LIVING AREA</text>
  <text x="397" y="215" class="text-sub">KITCHEN</text>
  <text x="148" y="450" class="text-main">BEDROOM</text>
  <text x="327" y="428" class="text-main">BATH</text>

  <rect x="48" y="148" width="273" height="194" class="flaw-highlight" />
  <path d="M 184 348 L 164 503" stroke="#D00000" stroke-width="2" fill="none" />
  <circle cx="184" cy="348" r="4" fill="#D00000" />
  <text x="40" y="528" class="text-flaw">FLAW: In this studio, the bathroom is tucked behind the sleeping zone —...</text>

  <text x="40" y="55" class="text-main" text-anchor="start">NEW YORK CITY / STUDIO</text>
  <line x1="40" y1="65" x2="260" y2="65" stroke="#1A1A1A" stroke-width="2" />

  <g transform="translate(496, 75)">
    <circle cx="0" cy="0" r="22" fill="none" stroke="#1A1A1A" stroke-width="2" />
    <path d="M 0 -19 L 4 -4 L 19 0 L 4 4 L 0 19 L -4 4 L -19 0 L -4 -4 Z" fill="#1A1A1A" />
    <text x="0" y="-25" class="compass-text">N</text>
  </g>

  <g transform="translate(396, 125)">
    <line x1="0" y1="0" x2="120" y2="0" stroke="#1A1A1A" stroke-width="4" />
    <text x="60" y="-10" class="text-sub">NOT TO SCALE</text>
  </g>
</svg>