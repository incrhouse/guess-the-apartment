      .flaw-highlight { fill: none; stroke: #D00000; stroke-width: 3; stroke-dasharray: 6,5; }
      .compass-text { font-family: "Courier New", Courier, monospace; font-weight: bold; font-size: 12px; fill: #1A1A1A; text-anchor: middle; }
