<svg xmlns="http://www.w3.org/2000/svg" width="600" height="560" viewBox="0 0 600 560">
<rect x="0" y="0" width="600" height="560" fill="#FFFFFF"/>
<style><![CDATA[
.wall{stroke:#1A1A1A;stroke-width:6;fill:none;}
.thin{stroke:#1A1A1A;stroke-width:1.5;fill:none;}
.door{stroke:#1A1A1A;stroke-width:1.5;fill:none;}
.label{font-family:monospace;font-size:11px;fill:#1A1A1A;text-anchor:middle;}
.small{font-family:monospace;font-size:10px;fill:#1A1A1A;}
.tiny{font-family:monospace;font-size:8px;fill:#1A1A1A;text-anchor:middle;}
.flaw{fill:none;stroke:#D00000;stroke-width:1.5;stroke-dasharray:6,5;}
]]></style>

<rect x="60" y="80" width="480" height="380" fill="none" class="wall"/>
