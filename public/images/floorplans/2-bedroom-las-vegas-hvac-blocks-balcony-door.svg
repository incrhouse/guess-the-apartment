<line x1="220" y1="270" x2="220" y2="460" class="wall"/>
<line x1="380" y1="80" x2="380" y2="270" class="wall"/>
<line x1="60" y1="270" x2="540" y2="270" class="wall"/>

<text x="70" y="55" class="small">FRONT DOOR</text>
<line x1="70" y1="80" x2="120" y2="80" stroke="#FFFFFF" stroke-width="10"/>
<line x1="70" y1="80" x2="70" y2="105" class="thin"/>
<path d="M70 105 A30 30 0 0 1 100 80" class="door"/>

<line x1="220" y1="162" x2="220" y2="188" stroke="#FFFFFF" stroke-width="10"/>
