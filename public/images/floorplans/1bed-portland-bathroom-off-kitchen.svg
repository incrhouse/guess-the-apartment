.label{font-family:monospace;font-size:11px;fill:#1A1A1A;text-anchor:middle;dominant-baseline:middle;letter-spacing:.8px;}
.small{font-family:monospace;font-size:10px;fill:#1A1A1A;}
.tiny{font-family:monospace;font-size:8px;fill:#1A1A1A;text-anchor:middle;dominant-baseline:middle;}
.flaw{fill:none;stroke:#D00000;stroke-width:1.5;stroke-dasharray:6 5;}
]]></style>
