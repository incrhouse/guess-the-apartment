<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
<rect x="0" y="0" width="600" height="600" fill="#FFFFFF"/>
<style><![CDATA[
.room{fill:#F5F5F5;stroke:#1A1A1A;stroke-width:8;}
