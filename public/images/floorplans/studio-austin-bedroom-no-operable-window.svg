<svg xmlns="http://www.w3.org/2000/svg" width="600" height="560" viewBox="0 0 600 560">
<rect x="0" y="0" width="600" height="560" fill="#FFFFFF"/>
<style><![CDATA[
.wall{stroke:#1A1A1A;stroke-width:6;fill:none;}
.thin{stroke:#1A1A1A;stroke-width:1.5;fill:none;}
.door{stroke:#1A1A1A;stroke-width:1.5;fill:none;}
.label{font-family:monospace;font-size:11px;fill:#1A1A1A;text-anchor:middle;}
.small{font-family:monospace;font-size:10px;fill:#1A1A1A;}
.tiny{font-family:monospace;font-size:8px;fill:#1A1A1A;text-anchor:middle;}
.flaw{fill:none;stroke:#D00000;stroke-width:1.5;stroke-dasharray:6,5;}
]]></style>

<rect x="60" y="80" width="480" height="380" fill="none" class="wall"/>
<line x1="220" y1="80" x2="220" y2="460" class="wall"/>
<line x1="380" y1="80" x2="380" y2="460" class="wall"/>

<text x="70" y="55" class="small">FRONT DOOR</text>
<line x1="70" y1="80" x2="120" y2="80" stroke="#FFFFFF" stroke-width="10"/>
<line x1="70" y1="80" x2="70" y2="105" class="thin"/>
<path d="M70 105 A30 30 0 0 1 100 80" class="door"/>

<line x1="220" y1="257" x2="220" y2="283" stroke="#FFFFFF" stroke-width="10"/>
<line x1="220" y1="257" x2="220" y2="283" class="thin"/>
<path d="M220 283 A26 26 0 0 0 194 257" class="door"/>
<line x1="380" y1="257" x2="380" y2="283" stroke="#FFFFFF" stroke-width="10"/>
<line x1="380" y1="257" x2="380" y2="283" class="thin"/>
<path d="M380 283 A26 26 0 0 0 354 257" class="door"/>

<text x="140" y="110" class="label">LIVING AREA</text>
<rect x="90" y="405" width="55" height="35" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="1.5"/><text x="117" y="426" class="tiny">SOFA</text>
<text x="300" y="110" class="label">KITCHEN</text>
<rect x="250" y="105" width="26" height="24" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="1.5"/><text x="263" y="122" class="tiny">FRG</text>
<rect x="280" y="105" width="26" height="24" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="1.5"/><text x="293" y="122" class="tiny">STV</text>
<text x="460" y="110" class="label">BATH</text>
<rect x="490" y="95" width="36" height="22" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="1.5"/><text x="508" y="109" class="tiny">TUB</text>
<rect x="395" y="430" width="26" height="20" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="1.5"/><text x="408" y="443" class="tiny">SINK</text>

<rect x="220" y="80" width="160" height="380" class="flaw"/>
<path d="M300 460 L270 500" stroke="#D00000" stroke-width="1.5" fill="none"/>
<circle cx="300" cy="460" r="3" fill="#D00000"/>
<text x="40" y="530" class="small" fill="#D00000">FLAW: A shaft-facing opening may technically admit some light, but it often provides poor a</text>

<g transform="translate(500,50)">
<circle cx="0" cy="0" r="18" fill="none" stroke="#1A1A1A" stroke-width="1.2"/>
<path d="M0 -24 L4 -14 L0 -17 L-4 -14 Z" fill="#1A1A1A"/>
<text x="0" y="-28" class="tiny">N</text>
</g>

<text x="60" y="555" class="small">AUSTIN / STUDIO</text>
</svg>